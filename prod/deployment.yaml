apiVersion: apps/v1
kind: Deployment
metadata:
  name: production-deployment
  labels:
    app: hello
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: hello-container
        image: us-east1-docker.pkg.dev/qwiklabs-gcp-04-9bb41898fcc4/my-repository/hello-cloudbuild:v1.0
        ports:
        - containerPort: 8080
